acl localnet src all
http_access allow localnet
http_port 3128

# FORCE HIGH MEMORY USAGE (SQUID 7+ STYLE)
fqdncache_size 100000
ipcache_size 100000
memory_pools on
memory_pools_limit 1500 MB

# In Squid 7, we scale via workers to increase the memory footprint
workers 4

cache_mem 512 MB
maximum_object_size_in_memory 512 KB